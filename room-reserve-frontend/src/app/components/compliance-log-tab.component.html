<section class="panel">
  <div class="section-head">
    <div>
      <p class="eyebrow">Read Only</p>
      <h3>Compliance Audit Logs</h3>
    </div>
  </div>
  <form [formGroup]="fg" (ngSubmit)="load()" class="filter-bar">
    <label>From Date<input type="date" class="form-control" formControlName="from" /></label>
    <label>To Date<input type="date" class="form-control" formControlName="to" /></label>
    <label>Booking ID<input class="form-control" formControlName="booking" placeholder="e.g. 1" /></label>
    <label>Room ID<input class="form-control" formControlName="room" placeholder="e.g. 3" /></label>
    <div class="filter-action">
      <button type="submit" class="btn btn-primary w-100">Filter Logs</button>
    </div>
  </form>
  <div class="table-wrap">
    <table class="table align-middle">
      <thead>
        <tr>
          <th>Time</th>
          <th>Action</th>
          <th>Actor</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let log of logs">
          <td>{{ log.timestamp | date:'short' }}</td>
          <td><span class="status-chip pending">{{ log.action }}</span></td>
          <td><strong>{{ log.username }}</strong></td>
          <td>{{ log.details }}</td>
        </tr>
        <tr *ngIf="logs.length === 0">
          <td colspan="4" class="text-center py-4 text-muted">No logs found matching current filter rules.</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
