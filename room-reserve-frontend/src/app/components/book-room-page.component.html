  <header class="page-hero">
    <div>
      <p class="eyebrow">Room Booking</p>
      <h1>Find the right room, {{ username }}</h1>
      <p class="hero-copy">Search by time, capacity, and amenities. Available rooms can be booked immediately, while restricted rooms enter the approval queue.</p>

    <div class="hero-metrics">
      <span><strong>Live</strong> backend availability</span>

      <div>

    </div>
