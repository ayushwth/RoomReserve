
<nav class="navbar navbar-expand-lg app-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand" [routerLink]="isLoggedIn() ? dashboardLink() : '/login'">
      <span class="brand-mark">RR</span>
      <span>RoomReserve</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navcollapse">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navcollapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0" *ngIf="isLoggedIn()">
        <li class="nav-item"><a class="nav-link" [routerLink]="dashboardLink()">Home</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/calendar">Calendar</a></li>
      </ul>
      <div class="nav-actions">
        <ng-container *ngIf="isLoggedIn(); else loggedOut">
          <a class="user-pill text-decoration-none" routerLink="/profile" title="View Profile">
            {{ displayName() }} <small>{{ roleLabel() }}</small>
          </a>
          <button class="btn btn-outline-secondary btn-sm" (click)="logout()">Logout</button>
        </ng-container>
        <ng-template #loggedOut>
          <a class="btn btn-outline-primary btn-sm" routerLink="/signup">Sign up</a>
          <a class="btn btn-primary btn-sm" routerLink="/login">Sign in</a>
        </ng-template>
      </div>
    </div>
  </div>
</nav>
